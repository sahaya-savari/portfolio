         FONT LOADING (LH-4 Fix)
         Preconnect first, then preload the most critical fonts,
         then full stylesheet. This eliminates 2 extra round-trips
         for Lobster + Outfit which FocusText uses inline.
    ====================================================== -->
    <!-- Preconnect to Google Fonts origin -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preconnect to video CDNs for faster media start -->
    <link rel="preconnect" href="https://stream.mux.com" />
    <link rel="preconnect" href="https://image.mux.com" />
    <link rel="dns-prefetch" href="https://stream.mux.com" />
    <link rel="dns-prefetch" href="https://image.mux.com" />
